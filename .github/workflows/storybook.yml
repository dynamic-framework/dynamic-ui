name: Storybook
on:
  release:
    types: [published]

jobs:
  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm ci
      - name: Ensure Rollup binary
        run: |
          # Workaround for Rollup optional dependencies issue in CI
          if [ ! -d "node_modules/@rollup/rollup-linux-x64-gnu" ]; then
            echo "Installing missing Rollup Linux binary..."
            npm install @rollup/rollup-linux-x64-gnu --no-save --no-package-lock
          fi
      - name: Build packages
        run: npm run build
      - name: Build storybook
        run: npm run build:storybook
      - name: Extract release version
        id: version
        run: echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
      - name: Fetch existing manifest from docs branch
        run: |
          git fetch origin docs 2>/dev/null || true
          git show origin/docs:docs/manifest.json > /tmp/manifest-prev.json 2>/dev/null \
            || echo '{"versions":[]}' > /tmp/manifest-prev.json
        continue-on-error: true
      - name: Generate manifest
        run: node scripts/generate-manifest.mjs /tmp/manifest-prev.json
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
      - name: Deploy latest 🚀
        uses: JamesIves/github-pages-deploy-action@3.6.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: docs
          FOLDER: docs
          CLEAN: true
          TARGET_FOLDER: docs/latest
          COMMIT_MESSAGE: 'doc: update storybook (latest)'
      - name: Deploy versioned 🚀
        uses: JamesIves/github-pages-deploy-action@3.6.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: docs
          FOLDER: docs
          CLEAN: false
          TARGET_FOLDER: docs/${{ steps.version.outputs.tag }}
          COMMIT_MESSAGE: 'doc: update storybook (${{ steps.version.outputs.tag }})'
      - name: Deploy manifest and schema to docs root 🚀
        run: |
          mkdir -p docs-root
          cp docs/manifest.json docs-root/manifest.json
          cp -r docs/schema docs-root/schema
      - uses: JamesIves/github-pages-deploy-action@3.6.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: docs
          FOLDER: docs-root
          CLEAN: false
          TARGET_FOLDER: docs
          COMMIT_MESSAGE: 'doc: update manifest and schema (${{ steps.version.outputs.tag }})'
      - name: Smoke test — verify versioned api.json is accessible on CDN
        run: |
          SEMVER="${{ steps.version.outputs.tag }}"
          SEMVER="${SEMVER#v}"
          URL="https://cdn.dynamicframework.dev/assets/${SEMVER}/ui-react/api.json"
          echo "Checking $URL"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✓ api.json is accessible on CDN (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/24: HTTP $STATUS — waiting 5s..."
            sleep 5
          done
          echo "✗ api.json not accessible on CDN after 2 minutes" >&2
          exit 1

