name: Release

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    name: Version and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node
          target-branch: master
          config-file: release-please-config.json
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # these if statements ensure that a publication only occurs when
        # a new release is created:
        if: ${{ steps.release.outputs.release_created }}
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org/
          scope: '@dynamic-framework'
        if: ${{ steps.release.outputs.release_created }}
      - name: Update npm
        run: npm install -g npm@11.5.1
        if: ${{ steps.release.outputs.release_created }}
      - name: Check npm version
        run: npm --version
        if: ${{ steps.release.outputs.release_created }}
      - name: Install dependencies
        run: npm ci
        if: ${{ steps.release.outputs.release_created }}
      - name: Ensure Rollup binary
        run: |
          # Workaround for Rollup optional dependencies issue in CI
          if [ ! -d "node_modules/@rollup/rollup-linux-x64-gnu" ]; then
            echo "Installing missing Rollup Linux binary..."
            npm install @rollup/rollup-linux-x64-gnu --no-save --no-package-lock
          fi
        if: ${{ steps.release.outputs.release_created }}
      - name: Build packages
        run: npm run build
        if: ${{ steps.release.outputs.release_created }}
      - name: Publish
        run: npm publish --access public
        if: ${{ steps.release.outputs.release_created }}