name: Sync CDN version / latest
on:
  release:
    types: [published]

jobs:
  build:
    name: Build and Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm ci
      - name: Ensure Rollup binary
        run: |
          # Workaround for Rollup optional dependencies issue in CI
          if [ ! -d "node_modules/@rollup/rollup-linux-x64-gnu" ]; then
            echo "Installing missing Rollup Linux binary..."
            npm install @rollup/rollup-linux-x64-gnu --no-save --no-package-lock
          fi
      - name: Build packages
        run: npm run build
      - name: Generate registry assets
        run: |
          node scripts/generate-api.mjs
          node scripts/generate-schema.mjs
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
      - name: Fetch existing manifest from CDN
        run: |
          curl -f https://cdn.dynamicframework.dev/assets/manifest.json \
            -o /tmp/manifest-prev.json 2>/dev/null \
            || echo '{"versions":{}}' > /tmp/manifest-prev.json
        continue-on-error: true
      - name: Generate manifest
        run: node scripts/generate-manifest.mjs /tmp/manifest-prev.json
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Publish to CDN
        run: npm run publish:cdn
      - name: Extract semver from package.json
        id: version
        run: echo "semver=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.version.outputs.semver }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      - name: Upload api.json to CDN (versioned + latest)
        run: |
          aws s3 cp registry/api.json \
            s3://dynamicframework-cdn/assets/${{ steps.version.outputs.semver }}/ui-react/api.json \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp registry/api.json \
            s3://dynamicframework-cdn/assets/latest/ui-react/api.json \
            --acl public-read \
            --cache-control "public, max-age=300, must-revalidate"
      - name: Upload JSON Schema to CDN
        run: |
          aws s3 cp registry/schema/v1.json \
            s3://dynamicframework-cdn/assets/schema/v1.json \
            --acl public-read \
            --cache-control "public, max-age=86400"
      - name: Upload manifest to CDN
        run: |
          aws s3 cp registry/manifest.json \
            s3://dynamicframework-cdn/assets/manifest.json \
            --acl public-read \
            --cache-control "public, max-age=60"
      - name: Smoke test — verify versioned api.json is accessible on CDN
        run: |
          URL="https://cdn.dynamicframework.dev/assets/${{ steps.version.outputs.semver }}/ui-react/api.json"
          echo "Checking $URL"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✓ api.json is accessible on CDN (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/24: HTTP $STATUS — waiting 5s..."
            sleep 5
          done
          echo "✗ api.json not accessible on CDN after 2 minutes" >&2
          exit 1
