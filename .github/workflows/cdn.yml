name: Sync CDN version / latest
on:
  release:
    types: [published]

jobs:
  build:
    name: Build and Sync
    runs-on: ubuntu-latest
    env:
      CDN_BASE_URL: https://cdn.dynamicframework.dev/assets
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm ci
      - name: Ensure Rollup binary
        run: |
          # Workaround for Rollup optional dependencies issue in CI
          if [ ! -d "node_modules/@rollup/rollup-linux-x64-gnu" ]; then
            echo "Installing missing Rollup Linux binary..."
            npm install @rollup/rollup-linux-x64-gnu --no-save --no-package-lock
          fi
      - name: Build packages
        run: npm run build
      - name: Build Storybook (for versioned manifests)
        run: npm run build:storybook
      - name: Generate registry assets
        run: |
          node scripts/generate-api.mjs
          node scripts/generate-schema.mjs
          node scripts/generate-token-overrides.mjs
          node scripts/generate-token-overrides-schema.mjs
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
      - name: Validate api.json against schema/v1.json
        run: npm run validate:registry
      - name: Validate token-overrides.json against token-overrides.v1.json
        run: npm run validate:token-overrides
      - name: Fetch existing manifest from CDN
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/manifest-prev.json -w "%{http_code}" \
            ${{ env.CDN_BASE_URL }}/manifest.json)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Manifest fetched (200)."
          elif [ "$HTTP_STATUS" = "404" ] || [ "$HTTP_STATUS" = "403" ]; then
            echo "Manifest not found ($HTTP_STATUS) — first publish, starting fresh."
            echo '{"versions":{}}' > /tmp/manifest-prev.json
          else
            echo "::error::Unexpected HTTP status $HTTP_STATUS fetching manifest. Aborting to protect version history."
            exit 1
          fi
      - name: Generate manifest
        run: node scripts/generate-manifest.mjs /tmp/manifest-prev.json
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
      - name: Extract semver from package.json
        id: version
        run: echo "semver=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.version.outputs.semver }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Publish to CDN
        run: |
          if [[ "${{ steps.version.outputs.semver }}" == *"-"* ]]; then
            npm run publish:cdn-version
          else
            npm run publish:cdn
          fi
      - name: Upload api.json to CDN (versioned)
        run: |
          aws s3 cp registry/api.json \
            s3://dynamicframework-cdn/assets/${{ steps.version.outputs.semver }}/ui-react/api.json \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable"
      - name: Upload Storybook components manifest to CDN (versioned)
        run: |
          aws s3 cp docs/manifests/components.json \
            s3://dynamicframework-cdn/assets/${{ steps.version.outputs.semver }}/ui-react/manifests/components.json \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable"
      - name: Upload Storybook docs manifest to CDN (versioned)
        run: |
          aws s3 cp docs/manifests/docs.json \
            s3://dynamicframework-cdn/assets/${{ steps.version.outputs.semver }}/ui-react/manifests/docs.json \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable"
      - name: Upload api.json to CDN (latest — stable releases only)
        if: ${{ !contains(steps.version.outputs.semver, '-') }}
        run: |
          aws s3 cp registry/api.json \
            s3://dynamicframework-cdn/assets/latest/ui-react/api.json \
            --acl public-read \
            --cache-control "public, max-age=300, must-revalidate"
      - name: Upload JSON Schema to CDN
        run: |
          aws s3 cp registry/schema/v1.json \
            s3://dynamicframework-cdn/assets/schema/v1.json \
            --acl public-read \
            --cache-control "public, max-age=86400"
      - name: Upload token-overrides.json to CDN (versioned)
        run: |
          aws s3 cp registry/token-overrides.json \
            s3://dynamicframework-cdn/assets/${{ steps.version.outputs.semver }}/ui-react/tokens/token-overrides.json \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable"
      - name: Upload token-overrides.json to CDN (latest — stable releases only)
        if: ${{ !contains(steps.version.outputs.semver, '-') }}
        run: |
          aws s3 cp registry/token-overrides.json \
            s3://dynamicframework-cdn/assets/latest/ui-react/tokens/token-overrides.json \
            --acl public-read \
            --cache-control "public, max-age=300, must-revalidate"
      - name: Upload token-overrides JSON Schema to CDN
        run: |
          aws s3 cp registry/schema/token-overrides.v1.json \
            s3://dynamicframework-cdn/assets/schema/token-overrides.v1.json \
            --acl public-read \
            --cache-control "public, max-age=86400"
      - name: Upload manifest to CDN
        run: |
          aws s3 cp registry/manifest.json \
            s3://dynamicframework-cdn/assets/manifest.json \
            --acl public-read \
            --cache-control "public, max-age=60"
      - name: Smoke test — verify versioned assets are accessible on CDN with application/json content-type
        run: |
          BASE="${{ env.CDN_BASE_URL }}/${{ steps.version.outputs.semver }}/ui-react"
          for path in "api.json" "manifests/components.json" "manifests/docs.json" "tokens/token-overrides.json"; do
            URL="$BASE/$path"
            echo "Checking $URL"
            success=0
            STATUS=""
            CTYPE=""
            for i in $(seq 1 24); do
              INFO=$(curl -s -o /dev/null -w '%{http_code}|%{content_type}' "$URL")
              STATUS="${INFO%|*}"
              CTYPE="${INFO#*|}"
              if [ "$STATUS" = "200" ]; then
                case "$CTYPE" in
                  application/json*)
                    echo "✓ $path is accessible on CDN (HTTP 200, $CTYPE)"
                    success=1
                    break
                    ;;
                  *)
                    echo "Attempt $i/24: HTTP 200 but unexpected content-type '$CTYPE' — waiting 5s..."
                    ;;
                esac
              else
                echo "Attempt $i/24: HTTP $STATUS — waiting 5s..."
              fi
              sleep 5
            done
            if [ "$success" = "0" ]; then
              echo "✗ $path not served as application/json on CDN after 2 minutes (last: HTTP $STATUS, content-type '$CTYPE')" >&2
              exit 1
            fi
          done
